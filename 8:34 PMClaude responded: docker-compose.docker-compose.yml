version: "3.9"
services:
  postgres:
    image: postgres:15-alpine
    container_name: uptime_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       uptime_db
      POSTGRES_USER:     uptime_user
      POSTGRES_PASSWORD: secure_password
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./worker/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uptime_user -d uptime_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - uptime_net
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: uptime_worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - uptime_net
  grafana:
    image: grafana/grafana:10.4.2
    container_name: uptime_grafana
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER:     admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SERVER_ROOT_URL: http://localhost:8080/
      GF_SERVER_SERVE_FROM_SUB_PATH: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - uptime_net
  nginx:
    image: nginx:alpine
    container_name: uptime_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - grafana
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - uptime_net
volumes:
  pgdata:
  grafana_data:
networks:
  uptime_net:
    driver: bridge
